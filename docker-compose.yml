version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: webby_seo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001.sql
      - ./backend/db/migrations/002_seed.sql:/docker-entrypoint-initdb.d/002.sql

  api:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/webby_seo
      PORT: "3001"
      TENANT_ID: "00000000-0000-0000-0000-000000000001"
      CORS_ORIGIN: "http://localhost:5173"
    depends_on:
      - db

  worker:
    build: ./backend
    command: ["node", "dist/worker.js"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/webby_seo
      TENANT_ID: "00000000-0000-0000-0000-000000000001"
    depends_on:
      - db

volumes:
  pgdata:
