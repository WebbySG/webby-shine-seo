version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: webby_seo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001.sql
      - ./backend/db/migrations/002_seed.sql:/docker-entrypoint-initdb.d/002.sql

  api:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/webby_seo
      PORT: "3001"
      TENANT_ID: "00000000-0000-0000-0000-000000000001"
      CORS_ORIGIN: "http://localhost:5173"
      # AI Provider: openai | gemini | template
      AI_PROVIDER: "${AI_PROVIDER:-template}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      # Video/TTS providers
      VIDEO_RENDER_PROVIDER: "${VIDEO_RENDER_PROVIDER:-placeholder}"
      TTS_PROVIDER: "${TTS_PROVIDER:-placeholder}"
    depends_on:
      - db

  worker:
    build: ./backend
    command: ["node", "dist/worker.js"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/webby_seo
      TENANT_ID: "00000000-0000-0000-0000-000000000001"
      DATAFORSEO_LOGIN: "${DATAFORSEO_LOGIN}"
      DATAFORSEO_PASSWORD: "${DATAFORSEO_PASSWORD}"
      # AI Provider config (shared with API for job processing)
      AI_PROVIDER: "${AI_PROVIDER:-template}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      # Video/TTS/Social providers
      VIDEO_RENDER_PROVIDER: "${VIDEO_RENDER_PROVIDER:-placeholder}"
      TTS_PROVIDER: "${TTS_PROVIDER:-placeholder}"
      SYNTHESIA_API_KEY: "${SYNTHESIA_API_KEY:-}"
      ELEVENLABS_API_KEY: "${ELEVENLABS_API_KEY:-}"
      # Social publishing credentials
      FACEBOOK_ACCESS_TOKEN: "${FACEBOOK_ACCESS_TOKEN:-}"
      INSTAGRAM_ACCESS_TOKEN: "${INSTAGRAM_ACCESS_TOKEN:-}"
      LINKEDIN_ACCESS_TOKEN: "${LINKEDIN_ACCESS_TOKEN:-}"
      TIKTOK_ACCESS_TOKEN: "${TIKTOK_ACCESS_TOKEN:-}"
      YOUTUBE_API_KEY: "${YOUTUBE_API_KEY:-}"
    depends_on:
      - db

volumes:
  pgdata:
